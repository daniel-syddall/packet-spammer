# ── Packet Spammer Configuration ─────────────────────────────────────────
#
# Manage tasks at runtime through the web UI at http://<host>:8080
# The web UI writes changes back to this file automatically.

# ── Web UI ────────────────────────────────────────────────────────────────

[api]
enabled = true
host    = "0.0.0.0"
port    = 8080

# ── Tasks ─────────────────────────────────────────────────────────────────
#
# Each [[tasks]] entry is one injection task.  type must be one of:
#   standard       — fixed packet, fixed channel
#   span           — staggered multi-channel cycling
#   beacon_sequence — rotating SSID beacon flood
#
# Tasks are managed through the web UI; the entries below are just defaults.

[[tasks]]
type               = "standard"
id                 = "demo0001"
name               = "Deauth Flood"
enabled            = false
channel            = 6
packets_per_second = 10
packet             = {type = "deauth", source_mac = "aa:bb:cc:dd:ee:ff", dest_mac = "ff:ff:ff:ff:ff:ff", bssid = "aa:bb:cc:dd:ee:ff", reason = 7}
