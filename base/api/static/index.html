<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packet Spammer</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2e3352;
      --text:     #e2e8f0;
      --muted:    #7a8096;
      --accent:   #4f8ef7;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --radius:   10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Pool Strip ────────────────────────────────────────────────── */
    #pool-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      min-height: 44px;
    }

    #pool-strip .pool-label { color: var(--muted); font-weight: 600; flex-shrink: 0; }

    .iface-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: monospace;
    }
    .iface-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .iface-badge.ready .dot { background: var(--green); }
    .pool-error { color: var(--red); font-size: 13px; }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    header h1 span { color: var(--accent); }

    /* ── Main ──────────────────────────────────────────────────────── */
    main { flex: 1; padding: 24px; max-width: 1400px; width: 100%; margin: 0 auto; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .toolbar h2 {
      font-size: 12px; font-weight: 700; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
    }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: none; border-radius: 7px; cursor: pointer;
      font-size: 13px; font-weight: 600; padding: 8px 16px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: var(--green);  color: #fff; }
    .btn-danger  { background: var(--red);    color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm      { padding: 5px 11px; font-size: 12px; }

    /* ── Task Grid ─────────────────────────────────────────────────── */
    #task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
    }
    .task-card.running { border-color: var(--green); }

    .task-card-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .task-card-title { font-size: 15px; font-weight: 700; flex: 1; word-break: break-word; }
    .task-card-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    .badge {
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
      letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap;
    }
    .badge-type-standard         { background: #1e3a5f; color: #7ab8ff; }
    .badge-type-span             { background: #2d1a5f; color: #b899ff; }
    .badge-type-beacon_sequence  { background: #1a3b2a; color: #5eed95; }
    .badge-running { background: #14532d; color: var(--green); }
    .badge-stopped { background: var(--surface2); color: var(--muted); }

    .task-card-stats {
      padding: 4px 16px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-value.running { color: var(--green); }
    .stat-value.sm { font-size: 13px; }

    .task-card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: var(--surface2);
      flex-wrap: wrap;
    }

    .pulse {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--green);
      animation: pulse 1.4s infinite; vertical-align: middle; margin-right: 2px;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .empty-state {
      grid-column: 1 / -1; text-align: center;
      padding: 64px 24px; color: var(--muted);
    }
    .empty-state p { font-size: 15px; margin-bottom: 16px; }

    /* ── Modal ─────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 16px;
    }
    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      display: flex; flex-direction: column;
    }

    .modal-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-header h2 { font-size: 17px; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 24px; cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
      background: var(--surface2);
      position: sticky; bottom: 0;
    }

    /* ── Form Fields ───────────────────────────────────────────────── */
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label {
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .field-row { display: flex; gap: 10px; }
    .field-row .field-group { flex: 1; min-width: 0; }

    input[type="text"], input[type="number"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .mac-field { display: flex; gap: 6px; }
    .mac-field input { flex: 1; min-width: 0; }

    .section-title {
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }

    /* ── Toasts ────────────────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px; z-index: 200;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px;
      font-size: 13px; min-width: 220px;
      animation: slide-in 0.2s ease;
    }
    .toast.success { border-color: var(--green); }
    .toast.error   { border-color: var(--red);   }
    @keyframes slide-in {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Confirm Dialog ────────────────────────────────────────────── */
    #confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    #confirm-overlay.hidden { display: none; }
    .confirm-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; max-width: 380px; width: 100%;
    }
    .confirm-box h3 { margin-bottom: 10px; font-size: 16px; }
    .confirm-box p  { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 10px; }
  </style>
</head>
<body>

<!-- Interface Pool Strip -->
<div id="pool-strip">
  <span class="pool-label">ADAPTERS</span>
  <div id="pool-ifaces" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span class="pool-error">Loading…</span>
  </div>
</div>

<!-- Header -->
<header>
  <h1>Packet <span>Spammer</span></h1>
  <button class="btn btn-primary" onclick="openAddModal()">+ Add Task</button>
</header>

<!-- Main Content -->
<main>
  <div class="toolbar">
    <h2>Tasks</h2>
  </div>
  <div id="task-grid"></div>
</main>

<!-- Task Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">Add Task</h2>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div class="modal-body">

      <!-- Name + Type row -->
      <div class="field-row">
        <div class="field-group" style="flex:2">
          <label>Task Name</label>
          <input id="f-name" type="text" placeholder="My Task" />
        </div>
        <div class="field-group" style="flex:1">
          <label>Task Type</label>
          <select id="f-type" onchange="onTypeChange()">
            <option value="standard">Standard</option>
            <option value="span">Span</option>
            <option value="beacon_sequence">Beacon Sequence</option>
          </select>
        </div>
      </div>

      <!-- Dynamic task-level fields -->
      <div id="task-type-fields"></div>

      <!-- Packet config (hidden for beacon_sequence) -->
      <div id="packet-section">
        <div class="section-title">Packet Config</div>
        <div style="margin-top:12px">
          <div class="field-group">
            <label>Frame Type</label>
            <select id="f-packet-type" onchange="renderPacketFields()">
              <option value="deauth">Deauthentication</option>
              <option value="beacon">Beacon</option>
              <option value="probe_req">Probe Request</option>
              <option value="disassoc">Disassociation</option>
              <option value="auth">Authentication</option>
            </select>
          </div>
          <div id="packet-fields" style="margin-top:12px;display:flex;flex-direction:column;gap:12px"></div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitModal()">Save Task</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Dialog -->
<div id="confirm-overlay" class="hidden">
  <div class="confirm-box">
    <h3 id="confirm-title">Delete Task</h3>
    <p id="confirm-msg">Are you sure?</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toasts"></div>

<script>
"use strict";

// ── State ──────────────────────────────────────────────────────────────────
let tasks    = [];
let poolData = { ready: false, count: 0, interfaces: [], error: null };
let editingTaskId = null;

// ── Schemas ────────────────────────────────────────────────────────────────
const PACKET_SCHEMAS = {
  deauth: [
    { id: "source_mac", label: "Source MAC",  type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
    { id: "dest_mac",   label: "Dest MAC",    type: "mac",    def: "ff:ff:ff:ff:ff:ff" },
    { id: "bssid",      label: "BSSID",       type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
    { id: "reason",     label: "Reason Code", type: "number", def: 7 },
  ],
  beacon: [
    { id: "ssid",       label: "SSID",       type: "text", def: "FreeWifi"          },
    { id: "source_mac", label: "Source MAC", type: "mac",  def: "aa:bb:cc:dd:ee:ff" },
    { id: "bssid",      label: "BSSID",      type: "mac",  def: "aa:bb:cc:dd:ee:ff" },
  ],
  probe_req: [
    { id: "source_mac", label: "Source MAC",               type: "mac",  def: "aa:bb:cc:dd:ee:ff" },
    { id: "ssid",       label: "SSID (empty = wildcard)",  type: "text", def: ""                  },
  ],
  disassoc: [
    { id: "source_mac", label: "Source MAC",  type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
    { id: "dest_mac",   label: "Dest MAC",    type: "mac",    def: "ff:ff:ff:ff:ff:ff" },
    { id: "bssid",      label: "BSSID",       type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
    { id: "reason",     label: "Reason Code", type: "number", def: 3 },
  ],
  auth: [
    { id: "source_mac", label: "Source MAC",                 type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
    { id: "dest_mac",   label: "Dest MAC",                   type: "mac",    def: "ff:ff:ff:ff:ff:ff" },
    { id: "bssid",      label: "BSSID",                      type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
    { id: "algo",       label: "Algorithm (0=Open,1=Shared)", type: "number", def: 0 },
    { id: "seq",        label: "Sequence Number",            type: "number", def: 1 },
  ],
};

const TASK_SCHEMAS = {
  standard: [
    { id: "channel",            label: "Channel",       type: "number", def: 6   },
    { id: "packets_per_second", label: "Packets / sec", type: "number", def: 10  },
  ],
  span: [
    { id: "channels",           label: "Channels (comma-separated)", type: "text",   def: "1,6,11" },
    { id: "dwell_ms",           label: "Dwell (ms)",                 type: "number", def: 1000     },
    { id: "packets_per_second", label: "Packets / sec",              type: "number", def: 10       },
  ],
  beacon_sequence: [
    { id: "task_name",          label: "SSID Prefix",     type: "text",   def: "seq" },
    { id: "sequence_length",    label: "Sequence Length", type: "number", def: 100   },
    { id: "channel",            label: "Channel",         type: "number", def: 6     },
    { id: "packets_per_second", label: "Packets / sec",   type: "number", def: 10    },
    { id: "source_mac",         label: "Source MAC",      type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
    { id: "bssid",              label: "BSSID",           type: "mac",    def: "aa:bb:cc:dd:ee:ff" },
  ],
};

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function randomMac() {
  return Array.from({length: 6}, (_, i) => {
    const v = Math.floor(Math.random() * 256);
    const b = i === 0 ? ((v & 0xFC) | 0x02) : v;
    return b.toString(16).padStart(2, "0");
  }).join(":");
}

function fmtNum(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + "K";
  return String(n);
}

function fmtTime(s) {
  s = Math.floor(s);
  if (s < 60)   return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}

function typeLabel(t) {
  return { standard: "Standard", span: "Span", beacon_sequence: "Beacon Seq" }[t] || t;
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, kind = "success") {
  const el = Object.assign(document.createElement("div"), {
    className: `toast ${kind}`, textContent: msg,
  });
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || r.statusText);
  return data;
}

// ── Poll ───────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const [pool, ts] = await Promise.all([
      api("GET", "/api/pool"),
      api("GET", "/api/tasks"),
    ]);
    poolData = pool;
    tasks    = ts;
    renderPool();
    renderTasks();
  } catch(e) {
    console.error("Poll error:", e);
  }
}

// ── Pool Strip ─────────────────────────────────────────────────────────────
function renderPool() {
  const el = document.getElementById("pool-ifaces");
  if (!poolData.ready) {
    el.innerHTML = `<span class="pool-error">${esc(poolData.error || "No adapters found")}</span>`;
    return;
  }
  el.innerHTML = poolData.interfaces.map(iface => `
    <span class="iface-badge ready">
      <span class="dot"></span>${esc(iface.active)}&nbsp;ch${iface.channel}
    </span>`).join("");
}

// ── Task Grid ──────────────────────────────────────────────────────────────
function renderTasks() {
  const grid = document.getElementById("task-grid");
  if (!tasks.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <p>No tasks configured yet.</p>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add your first task</button>
      </div>`;
    return;
  }
  grid.innerHTML = tasks.map(renderCard).join("");
}

function renderCard(t) {
  const running = !!t.running;
  const cfg     = t.config || {};

  const statusBadge = running
    ? `<span class="badge badge-running"><span class="pulse"></span> RUNNING</span>`
    : `<span class="badge badge-stopped">STOPPED</span>`;

  let extraStats = "";
  if (t.type === "standard") {
    extraStats = `
      <div class="stat-item"><span class="stat-label">Channel</span><span class="stat-value">ch ${cfg.channel ?? "?"}</span></div>
      <div class="stat-item"><span class="stat-label">Rate</span><span class="stat-value">${cfg.packets_per_second ?? "?"} pps</span></div>`;
  } else if (t.type === "span") {
    extraStats = `
      <div class="stat-item"><span class="stat-label">Channels</span><span class="stat-value sm">${(cfg.channels || []).join(", ")}</span></div>
      <div class="stat-item"><span class="stat-label">Dwell / Rate</span><span class="stat-value sm">${cfg.dwell_ms}ms · ${cfg.packets_per_second}pps</span></div>`;
  } else if (t.type === "beacon_sequence") {
    extraStats = `
      <div class="stat-item"><span class="stat-label">SSID Pattern</span><span class="stat-value sm">${esc(cfg.task_name)}-N-N</span></div>
      <div class="stat-item"><span class="stat-label">Seq Len / Rate</span><span class="stat-value sm">${cfg.sequence_length} · ${cfg.packets_per_second}pps</span></div>`;
  }

  const noPool  = !poolData.ready;
  const startDis = noPool || running  ? "disabled" : "";
  const stopDis  = !running            ? "disabled" : "";

  return `
  <div class="task-card ${running ? "running" : ""}">
    <div class="task-card-header">
      <div class="task-card-title">${esc(t.name)}</div>
      <div class="task-card-badges">
        <span class="badge badge-type-${t.type}">${typeLabel(t.type)}</span>
        ${statusBadge}
      </div>
    </div>
    <div class="task-card-stats">
      <div class="stat-item">
        <span class="stat-label">Packets Sent</span>
        <span class="stat-value ${running ? "running" : ""}">${fmtNum(t.packets_sent || 0)}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Session Time</span>
        <span class="stat-value">${t.session_uptime > 0 ? fmtTime(t.session_uptime) : "—"}</span>
      </div>
      ${extraStats}
    </div>
    <div class="task-card-footer">
      <button class="btn btn-success btn-sm" ${startDis} onclick="taskStart('${t.id}')">Start</button>
      <button class="btn btn-ghost  btn-sm" ${stopDis}  onclick="taskStop('${t.id}')">Stop</button>
      <button class="btn btn-ghost  btn-sm" onclick="openEditModal('${t.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDelete('${t.id}','${esc(t.name)}')">Delete</button>
    </div>
  </div>`;
}

// ── Task Actions ───────────────────────────────────────────────────────────
async function taskStart(id) {
  try   { await api("POST", `/api/tasks/${id}/start`); toast("Task started"); poll(); }
  catch (e) { toast(`Start failed: ${e.message}`, "error"); }
}

async function taskStop(id) {
  try   { await api("POST", `/api/tasks/${id}/stop`); toast("Task stopped"); poll(); }
  catch (e) { toast(`Stop failed: ${e.message}`, "error"); }
}

async function deleteTask(id) {
  try   { await api("DELETE", `/api/tasks/${id}`); toast("Task deleted"); poll(); }
  catch (e) { toast(`Delete failed: ${e.message}`, "error"); }
}

// ── Confirm Delete ─────────────────────────────────────────────────────────
function confirmDelete(id, name) {
  document.getElementById("confirm-title").textContent = "Delete Task";
  document.getElementById("confirm-msg").textContent   = `Delete "${name}"? This cannot be undone.`;
  document.getElementById("confirm-ok").onclick = () => { closeConfirm(); deleteTask(id); };
  document.getElementById("confirm-overlay").classList.remove("hidden");
}
function closeConfirm() {
  document.getElementById("confirm-overlay").classList.add("hidden");
}

// ── Modal Open ─────────────────────────────────────────────────────────────
function openAddModal() {
  editingTaskId = null;
  document.getElementById("modal-title").textContent = "Add Task";
  document.getElementById("f-name").value  = "";
  document.getElementById("f-type").value  = "standard";
  document.getElementById("f-packet-type").value = "deauth";
  onTypeChange();
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function openEditModal(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingTaskId = id;
  const cfg = t.config || {};
  document.getElementById("modal-title").textContent = "Edit Task";
  document.getElementById("f-name").value = t.name;
  document.getElementById("f-type").value = t.type;
  onTypeChange(cfg);
  if (t.type !== "beacon_sequence" && cfg.packet) {
    document.getElementById("f-packet-type").value = cfg.packet.type;
    renderPacketFields(cfg.packet);
  }
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.add("hidden");
  editingTaskId = null;
}

// Close on backdrop click
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target.id === "modal-overlay") closeModal();
});

// ── Modal — Dynamic Fields ─────────────────────────────────────────────────
function onTypeChange(existingCfg) {
  const type   = document.getElementById("f-type").value;
  const schema = TASK_SCHEMAS[type] || [];
  const wrap   = document.getElementById("task-type-fields");
  wrap.innerHTML = "";

  for (let i = 0; i < schema.length; i += 2) {
    const row = document.createElement("div");
    row.className = "field-row";
    [schema[i], schema[i+1]].filter(Boolean).forEach(f => row.appendChild(buildField(f, existingCfg)));
    wrap.appendChild(row);
  }

  const packetSec = document.getElementById("packet-section");
  if (type === "beacon_sequence") {
    packetSec.style.display = "none";
  } else {
    packetSec.style.display = "";
    renderPacketFields(existingCfg?.packet);
  }
}

function buildField(f, existingCfg) {
  const wrap  = document.createElement("div");
  wrap.className = "field-group";
  const label = document.createElement("label");
  label.textContent = f.label;
  wrap.appendChild(label);

  let existingVal = existingCfg ? existingCfg[f.id] : undefined;
  if (f.id === "channels" && Array.isArray(existingVal)) existingVal = existingVal.join(",");

  if (f.type === "mac") {
    const row  = document.createElement("div");
    row.className = "mac-field";
    const inp  = makeInput("text", `tf-${f.id}`, existingVal ?? f.def, "aa:bb:cc:dd:ee:ff");
    const btn  = Object.assign(document.createElement("button"), {
      type: "button", className: "btn btn-ghost btn-sm", textContent: "Rnd",
    });
    btn.onclick = () => { inp.value = randomMac(); };
    row.appendChild(inp);
    row.appendChild(btn);
    wrap.appendChild(row);
  } else {
    wrap.appendChild(makeInput(f.type === "number" ? "number" : "text", `tf-${f.id}`, existingVal ?? f.def));
  }
  return wrap;
}

function makeInput(type, id, value, placeholder) {
  const el = document.createElement("input");
  el.type  = type;
  el.id    = id;
  el.value = value !== undefined && value !== null ? value : "";
  if (placeholder) el.placeholder = placeholder;
  return el;
}

function renderPacketFields(existingPacket) {
  const type   = document.getElementById("f-packet-type").value;
  const schema = PACKET_SCHEMAS[type] || [];
  const wrap   = document.getElementById("packet-fields");
  wrap.innerHTML = "";

  for (let i = 0; i < schema.length; i += 2) {
    const row = document.createElement("div");
    row.className = "field-row";
    [schema[i], schema[i+1]].filter(Boolean).forEach(f => row.appendChild(buildField(f, existingPacket)));
    wrap.appendChild(row);
  }
}

// ── Modal Submit ───────────────────────────────────────────────────────────
async function submitModal() {
  const type = document.getElementById("f-type").value;
  const name = document.getElementById("f-name").value.trim() || "Unnamed Task";

  const body = { type, name, enabled: false };

  for (const f of TASK_SCHEMAS[type] || []) {
    const el = document.getElementById(`tf-${f.id}`);
    if (!el) continue;
    if (f.id === "channels") {
      body.channels = el.value.split(",").map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n));
    } else if (f.type === "number") {
      body[f.id] = Number(el.value);
    } else {
      body[f.id] = el.value;
    }
  }

  if (type !== "beacon_sequence") {
    const ptype  = document.getElementById("f-packet-type").value;
    const packet = { type: ptype };
    for (const f of PACKET_SCHEMAS[ptype] || []) {
      const el = document.getElementById(`tf-${f.id}`);
      if (!el) continue;
      packet[f.id] = f.type === "number" ? Number(el.value) : el.value;
    }
    body.packet = packet;
  }

  try {
    if (editingTaskId) {
      await api("PUT", `/api/tasks/${editingTaskId}`, body);
      toast("Task updated");
    } else {
      await api("POST", "/api/tasks", body);
      toast("Task created");
    }
    closeModal();
    poll();
  } catch(e) {
    toast(`Save failed: ${e.message}`, "error");
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
poll();
setInterval(poll, 1000);
</script>
</body>
